<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>toolweave × LangGraph</title>
    <style>
      :root {
        --bg: #0f1117;
        --panel: #181b23;
        --panel-2: #1f2330;
        --text: #e6e9f0;
        --muted: #8b93a7;
        --accent: #7c5cff;
        --ok: #3ecf8e;
        --border: #2a2f3e;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      header h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 600;
      }
      header span {
        color: var(--muted);
        font-size: 12px;
      }
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 860px;
        width: 100%;
        margin: 0 auto;
      }
      .msg {
        padding: 10px 14px;
        border-radius: 10px;
        line-height: 1.5;
        font-size: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .user {
        background: var(--accent);
        color: #fff;
        align-self: flex-end;
        max-width: 75%;
      }
      .assistant {
        background: var(--panel);
        border: 1px solid var(--border);
        align-self: flex-start;
        max-width: 85%;
      }
      details {
        align-self: flex-start;
        max-width: 85%;
        width: 100%;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 13px;
      }
      details summary {
        cursor: pointer;
        padding: 8px 14px;
        color: var(--muted);
        user-select: none;
      }
      details summary b {
        color: var(--ok);
        font-weight: 600;
      }
      details pre {
        margin: 0;
        padding: 12px 14px;
        overflow-x: auto;
        font-size: 12.5px;
        line-height: 1.55;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #c8d3f5;
        border-top: 1px solid var(--border);
      }
      form {
        display: flex;
        gap: 10px;
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        max-width: 860px;
        width: 100%;
        margin: 0 auto;
      }
      input {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
      }
      button {
        background: var(--accent);
        border: 0;
        color: #fff;
        border-radius: 10px;
        padding: 0 20px;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .thinking {
        color: var(--muted);
        font-size: 13px;
        align-self: flex-start;
        padding: 4px 2px;
      }
      .hint {
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        margin-top: 40px;
        line-height: 1.7;
      }
      .hint code {
        background: var(--panel-2);
        padding: 1px 6px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>toolweave × LangGraph</h1>
      <span>one typed TypeScript program instead of N tool calls</span>
    </header>
    <div id="chat">
      <div class="hint">
        Ask about the outdoor shop, e.g.<br />
        <code>Which outdoor products under 90€ are in stock, cheapest first?</code><br />
        The panel will show the TypeScript program the model writes.
      </div>
    </div>
    <form id="form">
      <input id="input" placeholder="Ask the shop agent…" autocomplete="off" autofocus />
      <button id="send" type="submit">Send</button>
    </form>
    <script>
      const chat = document.getElementById('chat');
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const send = document.getElementById('send');
      const history = [];

      function add(el) {
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
        return el;
      }
      function bubble(cls, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + cls;
        div.textContent = text;
        return add(div);
      }
      function panel(label, code) {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.innerHTML = label;
        const pre = document.createElement('pre');
        pre.textContent = code;
        details.append(summary, pre);
        return add(details);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        document.querySelector('.hint')?.remove();
        input.value = '';
        send.disabled = true;
        bubble('user', message);
        history.push({ role: 'user', content: message });
        const thinking = add(
          Object.assign(document.createElement('div'), {
            className: 'thinking',
            textContent: 'agent is writing a program…',
          }),
        );
        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ messages: history }),
          });
          const data = await res.json();
          thinking.remove();
          if (!res.ok) {
            bubble('assistant', '⚠ ' + (data.error ?? 'request failed'));
            return;
          }
          for (const step of data.steps) {
            if (step.type === 'program')
              panel('<b>program</b> the model wrote — click to expand', step.content);
            else if (step.type === 'tool_result') panel('sandbox result', step.content);
            else if (step.type === 'reply') {
              bubble('assistant', step.content);
              history.push({ role: 'assistant', content: step.content });
            }
          }
        } catch (err) {
          thinking.remove();
          bubble('assistant', '⚠ ' + err.message);
        } finally {
          send.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
